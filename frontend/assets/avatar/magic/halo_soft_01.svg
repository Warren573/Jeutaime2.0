<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300">
  <defs>
    <radialGradient id="haloGlow" cx="50%" cy="43%" r="50%">
      <stop offset="55%" stop-color="#FFD700" stop-opacity="0"/>
      <stop offset="78%" stop-color="#FFD700" stop-opacity="0.10"/>
      <stop offset="90%" stop-color="#FFA500" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0.32"/>
    </radialGradient>
  </defs>
  <!-- Fond de halo radial -->
  <rect width="240" height="300" fill="url(#haloGlow)"/>
